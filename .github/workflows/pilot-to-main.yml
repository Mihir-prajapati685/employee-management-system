name: Sync Pilot to Main

on:
  push:
    branches:
      - release/pilot

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pilot branch
        uses: actions/checkout@v4
        with:
          ref: release/pilot
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Merge pilot into main
        run: |
          git checkout main
          git merge origin/release/pilot --no-ff -m "Auto merge release/pilot → main"
          git push origin main
